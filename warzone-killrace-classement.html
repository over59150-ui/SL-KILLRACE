<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Warzone Kill Race - Classement</title>
<style>
:root{--text:#e8edf2;--muted:#9ca8b6;--blue:#00aaff;--blue2:#36c3ff;--success:#33ff99;--warning:#ffd166;--border:rgba(0,170,255,.28)}*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}body{min-height:100vh;color:var(--text);background:radial-gradient(circle at top left,rgba(0,170,255,.18),transparent 35%),linear-gradient(135deg,#05070c,#101722 45%,#05070c)}body:before{content:"";position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:36px 36px}header{padding:28px 6%;border-bottom:1px solid var(--border);background:rgba(5,7,12,.9);position:sticky;top:0;z-index:5}.header-row{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}.brand small{color:var(--blue);text-transform:uppercase;letter-spacing:4px;font-weight:bold;font-size:11px}.brand h1{font-size:clamp(30px,5vw,54px);text-transform:uppercase;letter-spacing:-2px}.brand h1 span{color:var(--blue);text-shadow:0 0 18px rgba(0,170,255,.85)}.badge{border:1px solid var(--border);color:var(--blue);padding:10px 14px;border-radius:999px;font-weight:bold;background:rgba(0,170,255,.08);text-transform:uppercase;font-size:12px;letter-spacing:1px}.live-dot{display:inline-block;width:10px;height:10px;background:var(--success);border-radius:99px;box-shadow:0 0 16px var(--success);margin-right:8px;animation:pulse 1.2s infinite}@keyframes pulse{0%,100%{opacity:.45;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}main{width:min(1400px,94%);margin:30px auto 70px;display:grid;gap:22px}.panel,.stat{background:linear-gradient(145deg,rgba(17,23,34,.96),rgba(8,12,18,.96));border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:0 0 35px rgba(0,170,255,.08)}h2{font-size:22px;text-transform:uppercase;margin-bottom:16px;border-left:4px solid var(--blue);padding-left:12px}.help,#syncStatus{color:var(--muted);font-size:14px;line-height:1.5}.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat small{color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:bold}.stat strong{display:block;font-size:30px;color:var(--blue);margin-top:6px}.dashboard{display:grid;grid-template-columns:1.2fr .8fr;gap:22px}table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:14px}th,td{padding:14px;text-align:left;border-bottom:1px solid rgba(255,255,255,.08)}th{color:var(--blue);text-transform:uppercase;letter-spacing:1px;font-size:12px;background:rgba(0,170,255,.06)}td{background:rgba(8,12,18,.55)}tr:first-child td{background:rgba(51,255,153,.08)}.empty{color:var(--muted);padding:14px;border:1px dashed rgba(255,255,255,.18);border-radius:12px;background:rgba(255,255,255,.03)}button{border:0;background:var(--blue);color:#02050a;padding:12px 15px;border-radius:10px;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:.8px}button.secondary{background:transparent;border:1px solid rgba(255,255,255,.18);color:var(--text)}input,textarea{width:100%;background:#070b12;border:1px solid rgba(255,255,255,.1);color:var(--text);padding:12px;border-radius:10px;outline:none}textarea{min-height:76px;resize:vertical}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.chat-box{display:grid;gap:12px}.messages{max-height:420px;overflow:auto;display:grid;gap:10px;padding:12px;border-radius:14px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08)}.msg{padding:12px;border-radius:12px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.07)}.msg strong{color:var(--blue)}.msg small{color:var(--muted);margin-left:8px}.msg p{margin-top:5px;overflow-wrap:anywhere}@media(max-width:950px){.dashboard{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}}@media(max-width:650px){.stats-row{grid-template-columns:1fr}table{font-size:13px}th,td{padding:10px}}
</style>
</head>
<body>
<header><div class="header-row"><div class="brand"><small>Classement public • Lecture seule</small><h1>Warzone <span>Kill Race</span></h1></div><div class="badge"><span class="live-dot"></span>LIVE • Resurgence</div></div></header>
<main>
<section class="panel"><h2>Classement en direct</h2><p id="syncStatus">Statut : chargement...</p><div class="actions"><button onclick="loadCloud()">Actualiser</button><button class="secondary" onclick="exportRankingImage()">Exporter le classement en image</button></div></section>
<section class="stats-row"><div class="stat"><small>Équipes</small><strong id="statTeams">0</strong></div><div class="stat"><small>Screens validés</small><strong id="statScreens">0</strong></div><div class="stat"><small>Meilleures games</small><strong id="statBest">3</strong></div><div class="stat"><small>Total kills</small><strong id="statKills">0</strong></div></section>
<section class="dashboard"><div class="panel" id="rankingPanel"><h2>Top équipes</h2><div style="overflow-x:auto"><table id="rankingTable"><thead><tr><th>#</th><th>Équipe</th><th>Roster</th><th>Score</th><th>Kills</th><th>Top 1</th><th>Games validées</th></tr></thead><tbody id="rankingBody"></tbody></table></div></div><div class="panel"><h2>Tchat en direct</h2><div class="chat-box"><div id="chatMessages" class="messages"><div class="empty">Chargement du tchat...</div></div><div><input id="chatName" maxlength="24" placeholder="Pseudo"></div><div><textarea id="chatText" maxlength="250" placeholder="Message..."></textarea></div><button onclick="sendChat()">Envoyer</button></div></div></section>
</main>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbyHuwrkiKEAZHOO7JkQspXsV3XFkrjcvHmoVXpYWOGKKbSvPC2lRq3QPXP-p6DkEa_rqQ/exec";
const LOCAL_KEY="wz_killrace_state_v1";
let state={settings:{bestGames:3,killPoint:1,top1Bonus:15,top5Bonus:5},teams:[],submissions:[],chat:[]};
const $=id=>document.getElementById(id);function escapeHtml(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function loadLocal(){try{state={...state,...JSON.parse(localStorage.getItem(LOCAL_KEY)||"{}")}}catch(e){}}
function saveLocal(){localStorage.setItem(LOCAL_KEY,JSON.stringify(state))}
async function api(action,payload={},method="POST"){if(!API_URL){loadLocal();return {ok:true,state,local:true}}let res;if(method==="GET")res=await fetch(API_URL+"?action="+encodeURIComponent(action)+"&t="+Date.now());else res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action,payload})});const data=await res.json();if(!data.ok)throw new Error(data.error||"Erreur API");return data}
async function loadCloud(){try{const data=await api("get",{},"GET");state=data.state||state;render();$("syncStatus").textContent="Statut : données chargées à "+new Date().toLocaleTimeString("fr-FR")+(data.local?" en local":" depuis Google Sheets")+"."}catch(e){$("syncStatus").textContent="Statut : erreur - "+e.message}}
function approved(){return (state.submissions||[]).filter(s=>s.status==="approved")}
function scoreGame(s){let pts=(Number(s.kills)||0)*Number(state.settings.killPoint||1);if(Number(s.placement)===1)pts+=Number(state.settings.top1Bonus||0);else if(Number(s.placement)<=5)pts+=Number(state.settings.top5Bonus||0);return pts}
function rankings(){return (state.teams||[]).map(t=>{const games=approved().filter(s=>s.teamId===t.id).map(s=>({...s,score:scoreGame(s)})).sort((a,b)=>b.score-a.score);const best=games.slice(0,Number(state.settings.bestGames||3));return {...t,validGames:games.length,score:best.reduce((a,g)=>a+g.score,0),kills:best.reduce((a,g)=>a+Number(g.kills||0),0),wins:best.filter(g=>Number(g.placement)===1).length}}).sort((a,b)=>b.score-a.score||b.kills-a.kills||b.wins-a.wins)}
function render(){const rows=rankings();$("statTeams").textContent=(state.teams||[]).length;$("statScreens").textContent=approved().length;$("statBest").textContent=state.settings.bestGames||3;$("statKills").textContent=approved().reduce((a,s)=>a+Number(s.kills||0),0);$("rankingBody").innerHTML=rows.length?rows.map((t,i)=>`<tr><td>${i+1}</td><td><strong>${escapeHtml(t.name)}</strong><br><small style="color:var(--muted)">${escapeHtml(t.captain||"")}</small></td><td>${escapeHtml((t.players||[]).join(", "))}</td><td><strong>${t.score}</strong></td><td>${t.kills}</td><td>${t.wins}</td><td>${t.validGames}</td></tr>`).join(""):`<tr><td colspan="7"><div class="empty">Aucun classement pour le moment.</div></td></tr>`;renderChat()}
function renderChat(){const chat=(state.chat||[]).slice(-60);$("chatMessages").innerHTML=chat.length?chat.map(m=>`<div class="msg"><strong>${escapeHtml(m.author || m.name)}</strong><small>${escapeHtml(m.createdAt)}</small><p>${escapeHtml(m.text)}</p></div>`).join(""):`<div class="empty">Aucun message pour le moment.</div>`;$("chatMessages").scrollTop=$("chatMessages").scrollHeight}
async function sendChat(){
  try{
    const author = $("chatName").value.trim() || "Viewer";
    const text = $("chatText").value.trim();

    if(!text) return;

    const data = await api("sendChat",{
      id: Date.now().toString(36)+Math.random().toString(36).slice(2),
      author: author,
      text: text
    });

    state = data.state || state;

    $("chatText").value = "";

    renderChat();

  }catch(e){
    alert(e.message);
  }
}
function exportRankingImage(){const rows=rankings().slice(0,15);const w=1200,h=160+rows.length*54;const c=document.createElement("canvas");c.width=w;c.height=h;const x=c.getContext("2d");x.fillStyle="#07101b";x.fillRect(0,0,w,h);x.fillStyle="#00aaff";x.font="bold 42px Arial";x.fillText("WARZONE KILL RACE - CLASSEMENT",40,60);x.fillStyle="#9ca8b6";x.font="22px Arial";x.fillText("Export : "+new Date().toLocaleString("fr-FR"),40,96);x.fillStyle="#111722";x.fillRect(40,120,w-80,42);x.fillStyle="#00aaff";x.font="bold 18px Arial";x.fillText("#",60,148);x.fillText("Équipe",120,148);x.fillText("Score",620,148);x.fillText("Kills",760,148);x.fillText("Top 1",900,148);x.fillText("Games",1040,148);rows.forEach((r,i)=>{const y=180+i*54;x.fillStyle=i===0?"#0f2a25":"#0b1420";x.fillRect(40,y-32,w-80,44);x.fillStyle="#e8edf2";x.font="bold 20px Arial";x.fillText(String(i+1),60,y-4);x.fillText(r.name,120,y-4);x.fillText(String(r.score),620,y-4);x.fillText(String(r.kills),760,y-4);x.fillText(String(r.wins),900,y-4);x.fillText(String(r.validGames),1040,y-4)});const a=document.createElement("a");a.download="classement-warzone-killrace.png";a.href=c.toDataURL("image/png");a.click()}
document.addEventListener("DOMContentLoaded",()=>{loadCloud();setInterval(loadCloud,5000)});
</script>
</body>
</html>
